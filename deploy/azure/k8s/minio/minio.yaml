# MinIO-on-AKS artifact store (Deployment-Safeguards-compliant: non-root, probes,
# resource limits). PVC on Azure managed disks. Root password comes from the
# apex-minio Secret (synthesized from Key Vault by the chart's SecretProviderClass,
# key APEX_INTEGRATION_MINIO_SECRET_KEY) so MinIO and the app share one credential.
#
# It is safe to apply before the chart: the pod remains Pending until the runtime
# SecretProviderClass syncs apex-minio from the server's CSI mount. The app then
# reaches it through the bootstrapped connection row at apex-minio:9000.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apex-minio
  labels:
    app.kubernetes.io/name: apex-minio
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apex-minio-gateway
  labels:
    app.kubernetes.io/name: apex-minio
data:
  nginx.conf: |
    # Complete reverse-proxy mitigations prescribed by GHSA-hv4r-mvr4-25vw
    # and GHSA-h749-fxx7-pwpg. MinIO listens only on pod loopback below.
    worker_processes auto;
    pid /tmp/nginx.pid;
    # Nginx's fixed error-log format can append the raw request line at every
    # severity. It cannot be made credential-safe, so disable it; Kubernetes
    # probes, exit status, and the query-free access log remain available.
    error_log /dev/null;
    events {
        worker_connections 1024;
    }
    http {
        log_format apex_safe escape=json
            '{"remote_addr":"$remote_addr","time":"$time_iso8601",'
            '"method":"$request_method","uri":"$uri",'
            '"protocol":"$server_protocol","status":$status,'
            '"bytes_sent":$body_bytes_sent}';
        access_log /dev/stdout apex_safe;
        client_body_temp_path /tmp/client_temp;
        proxy_temp_path /tmp/proxy_temp;
        fastcgi_temp_path /tmp/fastcgi_temp;
        uwsgi_temp_path /tmp/uwsgi_temp;
        scgi_temp_path /tmp/scgi_temp;
        map $http_x_amz_content_sha256 $block_unsigned_trailer {
            default 0;
            ~*STREAMING-UNSIGNED-PAYLOAD-TRAILER 1;
        }
        map $args $has_s3_select_argument {
            default 0;
            ~*(^|&)select(?:=|&|$) 1;
        }
        map "$request_method:$has_s3_select_argument" $block_s3_select {
            default 0;
            "POST:1" 1;
        }
        map $args $allowed_s3_post_arguments {
            default 0;
            ~*^(uploads=?|delete=?|uploadId=[^&]+)$ 1;
        }
        map "$request_method:$allowed_s3_post_arguments" $block_unapproved_s3_post {
            default 0;
            "POST:0" 1;
        }
        server {
            listen 9000 default_server;
            server_name _;
            client_max_body_size 0;
            recursive_error_pages off;
            if ($block_unsigned_trailer) {
                return 403;
            }
            if ($block_s3_select) {
                return 403;
            }
            if ($block_unapproved_s3_post) {
                return 403;
            }
            location / {
                proxy_pass http://127.0.0.1:9100;
                proxy_http_version 1.1;
                proxy_set_header Host $http_host;
                proxy_pass_request_headers on;
                proxy_request_buffering off;
                proxy_buffering off;
                proxy_intercept_errors on;
                error_page 500 502 503 504 = @sanitized_upstream_error;
                proxy_connect_timeout 5s;
                proxy_read_timeout 5m;
                proxy_send_timeout 5m;
            }
            location @sanitized_upstream_error {
                default_type text/plain;
                return 502 "S3 gateway upstream unavailable\n";
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-minio
  labels:
    app.kubernetes.io/name: apex-minio
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO volume
  selector:
    matchLabels:
      app.kubernetes.io/name: apex-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apex-minio
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-07-16T23-46-41Z@sha256:77ff9f7e12549d269990b167fa21da010fa8b0beb40d6064569b8887e37c456b
          # The archived OSS build remains reachable only over pod loopback.
          # Every remote request must traverse the fail-closed gateway sidecar.
          args:
            - server
            - /data
            - --address
            - 127.0.0.1:9100
            - --console-address
            - 127.0.0.1:9101
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: MINIO_ROOT_USER
              value: apex
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apex-minio
                  key: APEX_INTEGRATION_MINIO_SECRET_KEY
          ports:
            - { name: internal-s3, containerPort: 9100 }
            - { name: internal-console, containerPort: 9101 }
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              # Probe the only remotely reachable path, including the filter.
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
        - name: s3-security-gateway
          image: nginxinc/nginx-unprivileged:1.31.2-alpine3.23@sha256:6320020c7da8714feab524e02c08c5a1958675c4e68700e93a2fd8970b065786
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - { name: s3, containerPort: 9000 }
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          volumeMounts:
            - name: gateway-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: gateway-tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: apex-minio
        - name: gateway-config
          configMap:
            name: apex-minio-gateway
        - name: gateway-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: apex-minio
  labels:
    app.kubernetes.io/name: apex-minio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apex-minio
  ports:
    - { name: s3, port: 9000, targetPort: s3 }
