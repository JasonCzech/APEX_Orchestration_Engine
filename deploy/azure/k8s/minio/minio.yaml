# MinIO-on-AKS artifact store (Deployment-Safeguards-compliant: non-root, probes,
# resource limits). PVC on Azure managed disks. Root password comes from the
# apex-minio Secret (synthesized from Key Vault by the chart's SecretProviderClass,
# key APEX_INTEGRATION_MINIO_SECRET_KEY) so MinIO and the app share one credential.
#
# Apply into the release namespace AFTER the SecretProviderClass has synced apex-minio
# (the server/bootstrap pods mount it). The app reaches this via the bootstrap
# connection row at apex-minio.<ns>.svc.cluster.local:9000.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apex-minio
  labels:
    app.kubernetes.io/name: apex-minio
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-minio
  labels:
    app.kubernetes.io/name: apex-minio
spec:
  replicas: 1
  strategy:
    type: Recreate # single RWO volume
  selector:
    matchLabels:
      app.kubernetes.io/name: apex-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apex-minio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-07-16T23-46-41Z
          args: ["server", "/data", "--console-address", ":9001"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: MINIO_ROOT_USER
              value: apex
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: apex-minio
                  key: APEX_INTEGRATION_MINIO_SECRET_KEY
          ports:
            - { name: s3, containerPort: 9000 }
            - { name: console, containerPort: 9001 }
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: apex-minio
---
apiVersion: v1
kind: Service
metadata:
  name: apex-minio
  labels:
    app.kubernetes.io/name: apex-minio
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: apex-minio
  ports:
    - { name: s3, port: 9000, targetPort: s3 }
    - { name: console, port: 9001, targetPort: console }
