apiVersion: batch/v1
kind: CronJob
metadata:
  name: apex-minio-backup
  labels:
    app.kubernetes.io/name: apex-minio-backup
spec:
  schedule: "17 */6 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  # A controller outage should not launch a stale backup hours later, and one
  # wedged run must terminate well before it can suppress the next six-hour run.
  startingDeadlineSeconds: 900
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      activeDeadlineSeconds: 5400
      backoffLimit: 2
      ttlSecondsAfterFinished: 604800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: apex-minio-backup
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: apex-minio-backup
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: mirror
              image: rclone/rclone:1.70.3@sha256:34c729127386abec1c610b2aa024e39b4498dc2b4a72a0798ae21fbdc1b0493b
              args:
                # Keep the current backup as an exact mirror. Azure Blob soft
                # delete/versioning retains source deletions for recovery, while
                # the lifecycle policy expires superseded versions so storage is
                # bounded instead of growing forever.
                - sync
                - source:apex-artifacts
                - backup:apex-artifacts-backup
                - --checksum
                # Fail closed on a surprising bulk deletion; operators can
                # inspect the source and raise the cap for an intentional purge.
                - --max-delete=1000
                - --log-level=INFO
                # Bound network stalls and the complete rclone operation inside
                # the Job deadline. Kubernetes retries the failed pod twice.
                - --contimeout=30s
                - --timeout=5m
                - --max-duration=75m
                - --retries=8
                - --low-level-retries=8
                - --retries-sleep=30s
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: HOME
                  value: /tmp
                - name: RCLONE_CONFIG_SOURCE_TYPE
                  value: s3
                - name: RCLONE_CONFIG_SOURCE_PROVIDER
                  value: Minio
                - name: RCLONE_CONFIG_SOURCE_ACCESS_KEY_ID
                  value: apex
                - name: RCLONE_CONFIG_SOURCE_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: apex-minio
                      key: APEX_INTEGRATION_MINIO_SECRET_KEY
                - name: RCLONE_CONFIG_SOURCE_ENDPOINT
                  value: http://apex-minio:9000
                - name: RCLONE_CONFIG_SOURCE_FORCE_PATH_STYLE
                  value: "true"
                - name: RCLONE_CONFIG_BACKUP_TYPE
                  value: azureblob
                - name: RCLONE_CONFIG_BACKUP_ACCOUNT
                  valueFrom:
                    configMapKeyRef:
                      name: apex-minio-backup-config
                      key: AZURE_STORAGE_ACCOUNT
                - name: RCLONE_CONFIG_BACKUP_ENV_AUTH
                  value: "true"
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          volumes:
            - name: tmp
              emptyDir: {}
