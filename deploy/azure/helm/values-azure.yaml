# Helm overlay for AKS. Structural choices live here; deployment-specific values
# (ACR repo, Key Vault name, tenant/client id, ingress host) are passed by
# scripts/deploy.py / the deploy-aks workflow via --set from Terraform outputs.
#
#   helm upgrade --install apex deploy/helm/apex-orchestration-engine \
#     -f deploy/azure/helm/values-azure.yaml \
#     --set image.repository=$ACR/apex-orchestration-engine --set image.tag=$TAG \
#     --set-string image.digest=$BACKEND_DIGEST \
#     --set dashboard.image.repository=$ACR/apex-dashboard --set dashboard.image.tag=$TAG \
#     --set-string dashboard.image.digest=$DASHBOARD_DIGEST \
#     --set secretBackend.csi.keyvaultName=$KV --set secretBackend.csi.tenantId=$TENANT \
#     --set workloadIdentity.clientId=$CLIENT_ID

image:
  repository: REPLACE_ME.azurecr.io/apex-orchestration-engine

# Stable capability label consumed by the separately applied MinIO NetworkPolicy.
# Unlike Helm instance labels, it remains correct when APEX_RELEASE is customized.
podLabels:
  apex.io/minio-client: "true"

apexSettings:
  APEX_ENVIRONMENT: production
  APEX_AUTH__ENABLED: "true"
  # Production lockdown requires explicit https CORS origins (JSON array). Set to the
  # dashboard origin; with the same-origin dashboard reverse proxy this is the
  # ingress/gateway host.
  APEX_CORS_ORIGINS: '["https://apex.example.com"]'
  # NetworkPolicy below limits callers to the managed ingress controller and
  # same-release dashboard, so their private addresses are trusted to supply
  # X-Forwarded-For for per-client rate limiting.
  APEX_RATE_LIMIT__TRUSTED_PROXY_CIDRS: '["10.0.0.0/8"]'

# Secrets sourced from Key Vault via the Secrets Store CSI driver + workload identity.
workloadIdentity:
  enabled: true
  clientId: REPLACE_ME # Terraform output: workload_identity_client_id

hookWorkloadIdentity:
  clientId: REPLACE_ME # Terraform output: hook_identity_client_id

backupWorkloadIdentity:
  enabled: true
  clientId: REPLACE_ME # Terraform output: backup_identity_client_id
  serviceAccountName: apex-minio-backup

serviceAccount:
  create: true
  # Must match Terraform's workload_service_account federated-credential subject.
  name: apex-orchestration-engine
  # automountServiceAccountToken stays false; the in_cluster inventory adapter is opt-in.

# Database credentials are promoted by the role-provisioning pre-hook only after
# the new versioned login connects successfully. This Secret is deliberately not
# owned by the CSI driver's legacy runtime SecretProviderClass.
database:
  existingSecret: apex-database-active

# Must match Terraform's workload_hook_service_account federated subject.
hookServiceAccountName: apex-orchestration-engine-hooks

secretBackend:
  mode: secretsStoreCSI
  csi:
    keyvaultName: REPLACE_ME # Terraform output: key_vault_name
    hookKeyvaultName: REPLACE_ME # Terraform output: hook_key_vault_name
    cleanup:
      enabled: true
    tenantId: REPLACE_ME     # Terraform output: tenant_id
    # Runtime-only non-database objects. Database credentials are promoted into
    # apex-database-active by the role hook only after the candidate role works.
    objects:
      - { objectName: redis-uri, secretName: apex-redis, key: REDIS_URI }
      - { objectName: langgraph-license, secretName: apex-langgraph-license, key: LANGGRAPH_CLOUD_LICENSE_KEY }
      - { objectName: artifact-secret-key, secretName: apex-minio, key: APEX_INTEGRATION_MINIO_SECRET_KEY }
      - { objectName: api-key-hash-pepper, secretName: apex-auth, key: APEX_AUTH__API_KEY_HASH_PEPPER }
      - { objectName: previous-api-key-hash-peppers, secretName: apex-auth, key: APEX_AUTH__PREVIOUS_API_KEY_HASH_PEPPERS }
    hookObjects:
      - { objectName: database-admin-uri, secretName: apex-database-admin, key: APEX_DATABASE_ADMIN_URI }
      - { objectName: database-role-claim, secretName: apex-database-role-claim, key: APEX_DATABASE_ROLE_CLAIM_KEY }
      - { objectName: database-runtime-uri, secretName: apex-database-bootstrap, key: DATABASE_URI }
      - { objectName: apex-database-runtime-uri, secretName: apex-database-bootstrap, key: APEX_DATABASE__URI }
      - { objectName: apex-database-migration-uri, secretName: apex-database-migration, key: APEX_DATABASE__URI }
      - { objectName: bootstrap-admin-key, secretName: apex-admin, key: APEX_BOOTSTRAP_ADMIN_KEY }
      - { objectName: api-key-hash-pepper, secretName: apex-hook-auth, key: APEX_AUTH__API_KEY_HASH_PEPPER }
      - { objectName: previous-api-key-hash-peppers, secretName: apex-hook-auth, key: APEX_AUTH__PREVIOUS_API_KEY_HASH_PEPPERS }

# MinIO artifact store secret -> app env
# (the connection's secret_ref env:APEX_INTEGRATION_MINIO_SECRET_KEY).
extraEnv:
  - name: APEX_INTEGRATION_MINIO_SECRET_KEY
    valueFrom:
      secretKeyRef:
        name: apex-minio
        key: APEX_INTEGRATION_MINIO_SECRET_KEY

# Run migrations + bootstrap as pre-upgrade hooks.
migrations:
  enabled: true
  databaseSecret: apex-database-migration

databaseRoleProvisioning:
  enabled: true
  # Both supported Azure deploy paths pass atomic/cleanup-on-fail/wait and run
  # explicit CSI compensation on command failure or interruption, so the
  # post-upgrade hook runs only after the replacement Deployment is Ready.
  cleanupOldGenerations: true
  runtimeSecret: apex-database-bootstrap
  runtimePsycopgUriKey: DATABASE_URI
  publishRuntimeSecret: true

auth:
  previousApiKeyHashPeppersKey: APEX_AUTH__PREVIOUS_API_KEY_HASH_PEPPERS

bootstrap:
  enabled: true
  adminKeySecret:
    existingSecret: apex-admin
    key: APEX_BOOTSTRAP_ADMIN_KEY
  document:
    seed_default_prompts: true
    connections:
      - name: minio-artifacts
        kind: artifact_store
        provider: s3
        options:
          endpoint: apex-minio:9000
          bucket: apex-artifacts
          secure: false
          access_key: apex
          _apex_trusted_private_host: true
        secret_ref: env:APEX_INTEGRATION_MINIO_SECRET_KEY
    admin:
      name: apex-admin
      consumer_type: internal
      role: admin
      key_env: APEX_BOOTSTRAP_ADMIN_KEY

# Routing: managed NGINX ingress with SSE-safe annotations (or switch to gateway.enabled).
ingress:
  enabled: true
  className: webapprouting.kubernetes.azure.com
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "26m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: apex.example.com
      paths:
        - path: /
          pathType: Prefix
  # Provision this secret through the cluster certificate process before deploy.
  tls:
    - hosts: [apex.example.com]
      secretName: apex-tls

# Dashboard served alongside, same-origin reverse proxy to the server Service.
dashboard:
  enabled: true
  image:
    repository: REPLACE_ME.azurecr.io/apex-dashboard
  backendUpstream: http://apex-apex-orchestration-engine:80 # workflow/deploy.py override by release

# AKS app-routing ingress reaches the server from its controller namespace; the
# chart separately admits its same-release dashboard proxy. Public egress is
# required for the LangGraph license check and configured model providers.
networkPolicy:
  ingress:
    from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: app-routing-system
  egress:
    allowAll: true
