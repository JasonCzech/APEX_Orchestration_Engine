# Default values for apex-orchestration-engine.
#
# The chart deploys ONLY the stateless LangGraph standalone server. Postgres,
# Redis, and the S3/MinIO artifact store are EXTERNAL dependencies — no
# subcharts are bundled. Provision them separately and point the secret refs
# below at them. Run `python -m apex.persistence.migrate` against Postgres BEFORE every
# rollout (docs/runbooks/deployment.md).

# Stateless by design: all durable state is Postgres-checkpointed, so replicas
# are interchangeable and a mid-run restart resumes the execution poll loop
# from the last committed checkpoint (tests/integration/test_restart_survival.py).
replicaCount: 2

image:
  # Built with: langgraph build -t <repository>:<tag>  (see docs/runbooks/deployment.md)
  repository: apex-orchestration-engine
  tag: ""  # defaults to .Chart.AppVersion
  digest: ""  # required outside local/dev/test/compose; immutable sha256:...
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ──────────────────────────────── licensing ──────────────────────────────────
# !!! REQUIRED IN PRODUCTION — THE SERVER DOES NOT BOOT WITHOUT IT !!!
# The standalone LangGraph server requires LANGGRAPH_CLOUD_LICENSE_KEY, and the
# custom auth handlers this app ships need the Self-Hosted Enterprise tier
# (ADR-0001, ADR-0003). Create the secret out of band:
#
#   kubectl create secret generic apex-langgraph-license \
#     --from-literal=LANGGRAPH_CLOUD_LICENSE_KEY=<key>
#
# Setting existingSecret to "" omits the env var entirely — that is only useful
# for rendering experiments; the pods will crash-loop at startup without a key.
license:
  existingSecret: apex-langgraph-license
  secretKey: LANGGRAPH_CLOUD_LICENSE_KEY

# ───────────────────────── external data services ────────────────────────────
# Expected external services (documented contract, not provisioned here):
#   Postgres 16+  — LangGraph runtime tables (checkpoints/threads/runs, managed
#                   by the server) AND the `apex` schema (Alembic migrations).
#                   Both URIs usually point at the same database.
#   Redis 7       — stream pub-sub plus shared request/lockout/SSE admission
#                   limits between replicas.
#   S3/MinIO      — artifact store; reached via catalog `connections` rows
#                   (secret_ref -> env), not via chart values.
database:
  # Secret holding BOTH connection strings:
  #   kubectl create secret generic apex-database \
  #     --from-literal=DATABASE_URI='postgresql://user:pass@host:5432/apex?sslmode=verify-full&sslrootcert=system' \
  #     --from-literal=APEX_DATABASE__URI='postgresql+asyncpg://user:pass@host:5432/apex?sslmode=verify-full'
  existingSecret: apex-database
  uriKey: DATABASE_URI            # LangGraph runtime (psycopg-style URI)
  apexUriKey: APEX_DATABASE__URI  # apex schema / domain API (asyncpg URI)

redis:
  # kubectl create secret generic apex-redis \
  #   --from-literal=REDIS_URI='rediss://host:6380'
  existingSecret: apex-redis
  uriKey: REDIS_URI

# HMAC pepper used for API-key hashes. ExistingSecret/ESO installs share this
# Secret; CSI creates a hook-only copy so bootstrap never mounts runtime secrets.
auth:
  existingSecret: apex-auth
  apiKeyHashPepperKey: APEX_AUTH__API_KEY_HASH_PEPPER
  # Optional JSON list used only during a pepper rotation. Empty omits the env.
  previousApiKeyHashPeppersKey: ""

# ─────────────────────────── APEX domain settings ────────────────────────────
# Non-secret APEX_* environment (pydantic-settings, `__` nesting), rendered into
# a ConfigMap. Secrets (DB URIs, adapter secret_refs) belong in Secret refs:
# database/redis above or extraEnv below.
apexSettings:
  # Defense in depth for LangGraph's built-in request parser. The outer APEX
  # middleware applies a tighter 2 MiB default and allows 26 MiB only for docs.
  HTTP_MAX_REQUEST_BODY_BYTES: "27262976"
  FF_V2_EVENT_STREAMING: "false"
  APEX_REQUEST_BODY__TIMEOUT_S: "120"
  APEX_ENVIRONMENT: production
  APEX_AUTH__ENABLED: "true"
  # Locked environments reject the HTTP localhost defaults. Override with the
  # actual dashboard/ingress origin for each installation.
  APEX_CORS_ORIGINS: '["https://apex.example.com"]'
  # PostgreSQL advisory locks prevent two replicas from creating the same
  # costly provider run after concurrent retries.
  APEX_DISTRIBUTED_REMOTE_CREATION_LOCK: "true"
  # JSON list of networks allowed to supply X-Forwarded-For. Keep empty for
  # direct exposure; set to the ingress/gateway source networks when proxied so
  # authentication lockouts remain per client instead of per proxy pod.
  APEX_RATE_LIMIT__TRUSTED_PROXY_CIDRS: "[]"
  # Required for replicaCount > 1 and every locked environment. Limits fail
  # closed if Redis cannot make an authoritative shared admission decision.
  APEX_RATE_LIMIT__BACKEND: redis
  # Long-lived run SSE streams are admitted for their full connection lifetime,
  # separately from request-rate limits.
  APEX_RATE_LIMIT__SSE_GLOBAL_CONCURRENCY: "128"
  APEX_RATE_LIMIT__SSE_SOURCE_CONCURRENCY: "16"
  APEX_RATE_LIMIT__SSE_CREDENTIAL_CONCURRENCY: "8"
  APEX_RATE_LIMIT__SSE_LEASE_TTL_S: "30"
  APEX_RATE_LIMIT__RUN_CREATE_REQUESTS: "10"
  APEX_RATE_LIMIT__RUN_CREATE_WINDOW_S: "60"

# Extra env vars appended verbatim to the container (e.g. adapter secret_refs
# such as APEX_INTEGRATION_MINIO_SECRET_KEY via secretKeyRef, or LANGSMITH_API_KEY).
extraEnv: []
# - name: APEX_INTEGRATION_MINIO_SECRET_KEY
#   valueFrom:
#     secretKeyRef:
#       name: apex-minio
#       key: secret-key

containerPort: 8000  # langgraph standalone server listen port

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  # SSE: disable response buffering at every proxy hop, or live runs and
  # joined streams stall (mirrors deploy/compose-ha/nginx.conf).
  annotations: {}
  # nginx.ingress.kubernetes.io/proxy-buffering: "off"
  # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  hosts:
    - host: apex.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Liveness/startup use LangGraph's process-only endpoint. Readiness uses the
# APEX dependency-aware endpoint, which continuously verifies the schema,
# Redis admission backend, and required durable reconcilers.
livenessProbe:
  httpGet:
    path: /ok
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 4
readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
# Startup probe shields a slow first boot (license check + DB connect) from the
# liveness probe. AKS Automatic's Deployment Safeguards also expect probes set.
startupProbe:
  httpGet:
    path: /ok
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30  # ~150s budget before liveness takes over

schemaReadiness:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 2Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Surge-first rollout: never drop below replicaCount during upgrades so SSE
# consumers always have a replica to (re)join.
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 75

# Mid-run rolling restarts are safe BECAUSE state is checkpoint-durable: a
# killed replica's poll loop resumes on another replica without double-starting
# load (tests/integration/test_restart_survival.py). The PDB exists to keep at
# least one replica serving API/SSE traffic during voluntary disruptions — it
# is an availability guard, not a correctness requirement.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
# If affinity is set it wins verbatim; otherwise defaultPodAntiAffinity adds a
# SOFT (preferred) hostname spread so single-node/dev clusters still schedule.
affinity: {}
defaultPodAntiAffinity: true
# Soft zone spread (whenUnsatisfiable: ScheduleAnyway) so the 2 replicas land in
# different zones when possible without blocking on small clusters. An explicit
# topologySpreadConstraints list overrides this default.
topologySpreadConstraints: []
spreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: ScheduleAnyway

# ─────────────────────────── service account + RBAC ──────────────────────────
serviceAccount:
  create: true
  name: ""                          # "" => apex.serviceAccountName (the fullname)
  # The in-app k8s cluster-inventory adapter authenticates with a catalog
  # secret_ref token by default, so the pod needs no API token mounted. Flip on
  # only if you back the adapter's token with this SA (authMode: in_cluster).
  automountServiceAccountToken: false
  annotations: {}                   # e.g. azure.workload.identity/client-id: <id>

# Pre-install hooks run before Helm creates ordinary resources. In CSI mode the
# chart creates this dedicated workload-identity SA as an earlier hook; outside
# CSI mode hooks always use the namespace's existing default SA.
hookServiceAccountName: ""

rbac:
  # Namespaced read of deployments/services/ingresses for the in_cluster
  # inventory adapter. OFF by default (the bearer-token mode needs no pod RBAC).
  create: false
  clusterScope: false               # true => ClusterRole/ClusterRoleBinding (multi-namespace scans)
  rules: []                         # advanced override; empty => the read defaults

# Azure AD Workload Identity convenience: sets the SA annotation + pod label.
workloadIdentity:
  enabled: false
  clientId: ""                      # user-assigned managed identity client id

# Separate identity used only by migration/bootstrap CSI hooks. Keeping it
# distinct prevents the public server pod from reading bootstrap/admin secrets.
hookWorkloadIdentity:
  clientId: ""

# Optional identity-bound ServiceAccount for the Azure Blob backup CronJob.
backupWorkloadIdentity:
  enabled: false
  clientId: ""
  serviceAccountName: apex-minio-backup

# ──────────────────────────── migration hook Job ─────────────────────────────
# Pre-install/pre-upgrade hook running the compatibility-aware migration entry point against the apex
# schema BEFORE pods roll (the documented migrate-then-roll order). OFF by
# default: existing deployments keep running migrations out of band.
migrations:
  enabled: false
  # Defaults to database.existingSecret/key, or databaseRoleProvisioning.migrationSecret
  # when the chart provisions split roles. An explicit value always wins.
  databaseSecret: ""
  databaseKey: APEX_DATABASE__URI
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 300
  hookDeletePolicy: before-hook-creation,hook-succeeded
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Azure can provision dedicated PostgreSQL runtime/migration roles in-cluster
# before Alembic runs. The admin URI is confined to the hook-only secret store.
databaseRoleProvisioning:
  enabled: false
  # Stable NOLOGIN owner/group roles. They must be unique to this Helm release
  # within the database: the provisioning hook claims them with the immutable
  # <namespace>/<release> identity and rejects cross-release sharing. Credential
  # URIs must use generation logins named <owner>_v<generation>; this lets
  # rotations overlap safely.
  runtimeOwnerRole: apex_runtime
  migrationOwnerRole: apex_migration
  # Cleanup independently verifies that the Deployment has completed a rollout
  # to credentialGeneration before it retires an older login generation.
  cleanupOldGenerations: false
  # First 16 hex chars of sha256(<runtime-login>:<migration-login>). Binding
  # both role names prevents either credential generation from rotating without
  # changing the Deployment pod template.
  credentialGeneration: ""
  # Stable high-entropy claim key used to HMAC PostgreSQL role ownership
  # markers. Keep this hook-only Secret across admin-password and login-role
  # rotations; losing/rotating it intentionally makes role adoption fail closed.
  claimSecret: apex-database-role-claim
  claimSecretKey: APEX_DATABASE_ROLE_CLAIM_KEY
  # CSI rotation safety: after both candidate logins connect, publish the two
  # runtime URIs into database.existingSecret. Ignored outside secretsStoreCSI.
  publishRuntimeSecret: false
  adminSecret: apex-database-admin
  adminUriKey: APEX_DATABASE_ADMIN_URI
  runtimeSecret: apex-database
  runtimeUriKey: APEX_DATABASE__URI
  runtimePsycopgUriKey: DATABASE_URI
  migrationSecret: apex-database-migration
  migrationUriKey: APEX_DATABASE__URI
  hookDeletePolicy: before-hook-creation,hook-succeeded

# ──────────────────────────── bootstrap hook Job ─────────────────────────────
# Post-migration hook that applies a declarative bootstrap document
# (apex.bootstrap): prompts/applications/environments/connections + an initial
# admin consumer. The document carries NO secrets (secret_ref names only); the
# admin key comes from a Secret via adminKeySecret. OFF by default.
bootstrap:
  enabled: false
  # Defaults to the runtime database/auth Secrets. CSI deployments use distinct
  # hook-synthesized names unless explicitly overridden. Both database aliases
  # are injected because locked settings validate the APEX and LangGraph DSNs.
  databaseSecret: ""
  databaseKey: ""
  langgraphDatabaseSecret: ""
  langgraphDatabaseKey: ""
  authSecret: ""
  # Inline JSON/YAML document rendered into a ConfigMap and mounted at /bootstrap.
  document: {}
  adminKeySecret:
    existingSecret: ""              # Secret holding the initial admin key
    key: APEX_BOOTSTRAP_ADMIN_KEY
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 300
  hookDeletePolicy: before-hook-creation,hook-succeeded
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

# ───────────────────────────── secret backend ────────────────────────────────
# How the DATABASE_URI / APEX_DATABASE__URI / REDIS_URI / license secrets are
# produced. In every mode the deployment consumes the SAME secret names/keys
# (database/redis/license above) — only the producer differs.
secretBackend:
  mode: existingSecret              # existingSecret | secretsStoreCSI | externalSecrets
  # Azure Key Vault via the Secrets Store CSI driver. secretObjects synthesize
  # the K8s Secrets the deployment already references; a CSI volume is mounted to
  # trigger the sync. Pair with workloadIdentity for auth.
  csi:
    secretProviderClassName: ""     # "" => <fullname>-akv
    keyvaultName: ""
    hookKeyvaultName: ""             # defaults to keyvaultName
    tenantId: ""
    clientId: ""                    # workload-identity client id (defaults to workloadIdentity.clientId)
    hookClientId: ""                # defaults to hookWorkloadIdentity.clientId
    cloudName: AzurePublicCloud
    syncJob:
      backoffLimit: 2
      activeDeadlineSeconds: 300
      # Keep the completed pod mounted until ordinary workload pods take over;
      # the post-rollout cleanup hook then removes the privileged sync mount.
      hookDeletePolicy: before-hook-creation
    cleanup:
      # Opt in only for CSI installations; leave enabled for the first upgrade
      # that switches away from CSI so stale hook mounts are removed.
      enabled: false
      image: registry.k8s.io/kubectl:v1.31.6@sha256:75b960cfcc884965aa204619ff5eb9f9d50c7174827a867db8d24dff319a0272
      # Exact former hook Secret names to remove during the first upgrade that
      # adopts the automatic prior-name ledger while also renaming a Secret.
      # Leave empty for ordinary upgrades; remove entries after one success.
      previousHookSecretNames: []
    # KV object name -> the K8s secret + key the deployment expects.
    objects:
      - { objectName: database-uri, secretName: apex-database, key: DATABASE_URI }
      - { objectName: apex-database-uri, secretName: apex-database, key: APEX_DATABASE__URI }
      - { objectName: redis-uri, secretName: apex-redis, key: REDIS_URI }
      - { objectName: langgraph-license, secretName: apex-langgraph-license, key: LANGGRAPH_CLOUD_LICENSE_KEY }
      - { objectName: api-key-hash-pepper, secretName: apex-auth, key: APEX_AUTH__API_KEY_HASH_PEPPER }
    # Hook-only objects are mounted by the ordered pre-install Job, never by the
    # public server Deployment. The generic defaults reuse the same DB/pepper;
    # the Azure overlay replaces this list with dedicated-role secrets.
    hookObjects:
      - { objectName: database-uri, secretName: apex-database-bootstrap, key: DATABASE_URI }
      - { objectName: apex-database-uri, secretName: apex-database-bootstrap, key: APEX_DATABASE__URI }
      - { objectName: api-key-hash-pepper, secretName: apex-hook-auth, key: APEX_AUTH__API_KEY_HASH_PEPPER }
      - { objectName: database-role-claim, secretName: apex-database-role-claim, key: APEX_DATABASE_ROLE_CLAIM_KEY }
  # External Secrets Operator. Each target becomes an ExternalSecret producing one
  # of the consumed Secret names from the configured store.
  externalSecrets:
    refreshInterval: 1h
    secretStoreRef:
      name: ""
      kind: ClusterSecretStore
    targets: []
    # Each target may override secretStoreRef, which is required when runtime
    # and privileged hook credentials live in separate stores/vaults.

# ───────────────────────────── gateway / ingress ─────────────────────────────
# Gateway API (AKS app-routing) as an alternative to the Ingress above. SSE
# needs response buffering off + long timeouts at every hop (mirrors
# deploy/compose-ha/nginx.conf); verify your gateway honors that.
gateway:
  enabled: false
  gatewayName: ""                   # parent Gateway (often cluster-managed, e.g. app routing)
  gatewayNamespace: ""
  hostnames: []
  annotations: {}

# ───────────────────────────── network policy ────────────────────────────────
# ON by default: matched pods are default-deny except for the explicit rules below.
# Defaults allow DNS plus private-network data-plane ports commonly used by
# Postgres, Redis, private object storage/MinIO, and the Kubernetes API. Tighten
# these CIDRs/selectors for your cluster in production.
networkPolicy:
  enabled: true
  ingress:
    from: []                        # namespaceSelector/podSelector of the gateway/controller
    ports:
      - { port: 8000, protocol: TCP }
  egress:
    dns: true                       # allow udp/tcp 53 to kube-dns
    allowAll: false                 # single allow-all egress (LLM/registry endpoints are public + varied)
    rules:
      # Same-namespace data services, e.g. an in-cluster Redis/MinIO dependency.
      - to:
          - podSelector: {}
        ports:
          - { port: 443, protocol: TCP }   # Kubernetes API / HTTPS private endpoints
          - { port: 5432, protocol: TCP }  # Postgres
          - { port: 6379, protocol: TCP }  # Redis
          - { port: 6380, protocol: TCP }  # Redis TLS
          - { port: 9000, protocol: TCP }  # MinIO/S3 API
      # Private endpoint / VNet destinations for managed Postgres, Redis, object
      # storage, and the Kubernetes API.
      - to:
          - ipBlock: { cidr: 10.0.0.0/8 }
          - ipBlock: { cidr: 172.16.0.0/12 }
          - ipBlock: { cidr: 192.168.0.0/16 }
        ports:
          - { port: 443, protocol: TCP }
          - { port: 5432, protocol: TCP }
          - { port: 6379, protocol: TCP }
          - { port: 6380, protocol: TCP }
          - { port: 9000, protocol: TCP }
    to: []                          # legacy extra destinations; allows all ports to listed peers

# ─────────────────────────── observability hooks ─────────────────────────────
# LangGraph's unauthenticated meta routes are disabled in langgraph.json, including
# /metrics. These remain OFF until APEX adds a separately authenticated endpoint.
metrics:
  podAnnotations: false             # add prometheus.io/scrape pod annotations
  path: /metrics
  port: http
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}
    path: /metrics

# ───────────────────────────── helm test ─────────────────────────────────────
tests:
  enabled: true
  image: curlimages/curl:8.10.1@sha256:d9b4541e214bcd85196d6e92e2753ac6d0ea699f0af5741f8c6cccbfcf00ef4b

# ─────────────────────────────── dashboard ───────────────────────────────────
# Optional SPA component (apps/dashboard image). OFF by default so the chart stays
# a pure server deployment unless you opt in. One image serves any environment;
# backend wiring is via env (config.json is generated at container start).
dashboard:
  enabled: false
  replicaCount: 2
  image:
    repository: apex-dashboard
    tag: ""                       # defaults to .Chart.AppVersion
    digest: ""                    # required in locked environments when enabled
    pullPolicy: Always
  containerPort: 8080
  service:
    type: ClusterIP
    port: 80
  # SPA backend discovery. Leave origins empty + set backendUpstream to reverse-
  # proxy API paths in-pod (same origin, SSE-safe). Or set origins to point the SPA
  # straight at the server/langgraph (then CORS must allow the dashboard origin).
  # Values are complete HTTP(S) origins only: no userinfo, path, query, or fragment.
  # Explicit origins must use HTTPS outside local/development/test environments.
  # Enabling the dashboard requires backendUpstream or both explicit origins.
  config:
    apexOrigin: ""
    langgraphOrigin: ""
  backendUpstream: ""             # e.g. http://<release>-apex-orchestration-engine:80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101                # nginx-unprivileged
    runAsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true  # works: pid/temp/config.json all live under /tmp
    capabilities:
      drop:
        - ALL
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
