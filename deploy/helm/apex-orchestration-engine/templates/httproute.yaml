{{- if .Values.gateway.enabled -}}
# Gateway API route (e.g. AKS app-routing managed gateway). SSE: ensure the parent
# Gateway/BackendTrafficPolicy disables response buffering and uses long timeouts,
# or live run streams stall (mirrors the Ingress annotations / compose-ha nginx.conf).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "apex.fullname" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ required "gateway.gatewayName is required when gateway.enabled" .Values.gateway.gatewayName }}
      {{- with .Values.gateway.gatewayNamespace }}
      namespace: {{ . }}
      {{- end }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - backendRefs:
        - name: {{ if .Values.dashboard.enabled }}{{ include "apex.dashboard.fullname" . }}{{ else }}{{ include "apex.fullname" . }}{{ end }}
          port: {{ if .Values.dashboard.enabled }}{{ .Values.dashboard.service.port }}{{ else }}{{ .Values.service.port }}{{ end }}
{{- end }}
