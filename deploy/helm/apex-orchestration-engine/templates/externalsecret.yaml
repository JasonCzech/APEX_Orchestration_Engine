{{- if eq .Values.secretBackend.mode "externalSecrets" -}}
# External Secrets Operator. Each target produces one of the K8s Secret names the
# Deployment consumes, pulled from the configured (Cluster)SecretStore.
{{- range .Values.secretBackend.externalSecrets.targets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  labels:
    {{- include "apex.labels" $ | nindent 4 }}
spec:
  refreshInterval: {{ $.Values.secretBackend.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ required "secretBackend.externalSecrets.secretStoreRef.name is required" $.Values.secretBackend.externalSecrets.secretStoreRef.name }}
    kind: {{ $.Values.secretBackend.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ .name }}
    creationPolicy: Owner
  data:
    {{- range .data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        {{- with .remoteProperty }}
        property: {{ . }}
        {{- end }}
    {{- end }}
{{- end }}
{{- end }}
