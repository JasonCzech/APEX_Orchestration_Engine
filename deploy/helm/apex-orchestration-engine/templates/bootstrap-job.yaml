{{- if .Values.bootstrap.enabled -}}
# Post-migration hook (weight 0, after migrate -5 and the doc ConfigMap -1):
# applies the declarative bootstrap document with `python -m apex.bootstrap`.
# The initial admin key is injected from a Secret (never inlined/logged).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "apex.suffixedName" (dict "base" (include "apex.fullname" .) "suffix" "bootstrap") }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": {{ .Values.bootstrap.hookDeletePolicy }}
spec:
  backoffLimit: {{ .Values.bootstrap.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.bootstrap.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.bootstrap.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "apex.hookSelectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "apex.hookServiceAccountName" . | quote }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: bootstrap
          image: {{ include "apex.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["python", "-m", "apex.bootstrap", "/bootstrap/bootstrap.json"]
          env:
            # Validate bootstrap under the same locked-down, TLS/CORS/auth
            # policy as the runtime without depending on a non-hook ConfigMap
            # that does not exist yet during pre-install.
            {{- include "apex.hookSettingsEnv" . | nindent 12 }}
            {{- include "apex.bootstrapDbEnv" . | nindent 12 }}
            {{- include "apex.bootstrapRedisEnv" . | nindent 12 }}
            {{- include "apex.bootstrapAuthEnv" . | nindent 12 }}
            {{- if .Values.bootstrap.adminKeySecret.existingSecret }}
            - name: APEX_BOOTSTRAP_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.bootstrap.adminKeySecret.existingSecret | quote }}
                  key: {{ .Values.bootstrap.adminKeySecret.key | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.bootstrap.resources | nindent 12 }}
          volumeMounts:
            - name: bootstrap-doc
              mountPath: /bootstrap
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: bootstrap-doc
          configMap:
            name: {{ include "apex.suffixedName" (dict "base" (include "apex.fullname" .) "suffix" "bootstrap") }}
        - name: tmp
          emptyDir: {}
{{- end }}
