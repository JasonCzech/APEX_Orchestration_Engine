{{- if and .Values.databaseRoleProvisioning.enabled .Values.databaseRoleProvisioning.cleanupOldGenerations -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "apex.databaseRoleCleanupServiceAccountName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-role-cleanup
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "apex.databaseRoleCleanupServiceAccountName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-role-cleanup
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: [{{ include "apex.fullname" . | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "apex.databaseRoleCleanupServiceAccountName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-role-cleanup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "apex.databaseRoleCleanupServiceAccountName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "apex.databaseRoleCleanupServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
