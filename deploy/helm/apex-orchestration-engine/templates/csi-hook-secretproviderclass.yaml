{{- if eq .Values.secretBackend.mode "secretsStoreCSI" -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "apex.hookAkVSecretProviderClassName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-hook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-25"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "apex.hookWorkloadIdentityClientId" . | quote }}
    keyvaultName: {{ required "secretBackend.csi.hookKeyvaultName/keyvaultName is required for secretsStoreCSI" (include "apex.hookKeyvaultName" .) | quote }}
    tenantId: {{ required "secretBackend.csi.tenantId is required for secretsStoreCSI" .Values.secretBackend.csi.tenantId | quote }}
    cloudName: {{ .Values.secretBackend.csi.cloudName | quote }}
    objects: |
      array:
        {{- range .Values.secretBackend.csi.hookObjects }}
        - |
          objectName: {{ .objectName | quote }}
          objectType: secret
        {{- end }}
  secretObjects:
    {{- $grouped := dict }}
    {{- range .Values.secretBackend.csi.hookObjects }}
    {{- $existing := index $grouped .secretName | default (list) }}
    {{- $_ := set $grouped .secretName (append $existing (dict "objectName" .objectName "key" .key)) }}
    {{- end }}
    {{- range $secretName, $entries := $grouped }}
    - secretName: {{ $secretName | quote }}
      type: Opaque
      labels:
        app.kubernetes.io/name: {{ include "apex.name" $ | quote }}
        app.kubernetes.io/instance: {{ $.Release.Name | quote }}
        app.kubernetes.io/component: csi-hook-secret
      data:
        {{- range $entries }}
        - objectName: {{ .objectName | quote }}
          key: {{ .key | quote }}
        {{- end }}
    {{- end }}
{{- end }}
