{{- if eq .Values.secretBackend.mode "secretsStoreCSI" -}}
{{- $wiClientId := required "workload identity client id is required for secretsStoreCSI" (include "apex.workloadIdentityClientId" .) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "apex.hookServiceAccountName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-hook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation
    azure.workload.identity/client-id: {{ $wiClientId | quote }}
automountServiceAccountToken: false
{{- end }}
