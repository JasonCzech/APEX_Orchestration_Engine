{{- if eq .Values.secretBackend.mode "secretsStoreCSI" -}}
{{- $wiClientId := required "hook workload identity client id is required for secretsStoreCSI" (include "apex.hookWorkloadIdentityClientId" .) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "apex.hookServiceAccountName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-hook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation
    azure.workload.identity/client-id: {{ $wiClientId | quote }}
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "apex.csiSyncRbacName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-hook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  # The sync hook only compares the configured native Secrets. Restrict reads
  # to those exact names instead of granting the privileged hook identity
  # namespace-wide Secret access between releases.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- range .Values.secretBackend.csi.hookObjects }}
      - {{ .secretName | quote }}
      {{- end }}
      {{- range .Values.secretBackend.csi.objects }}
      - {{ .secretName | quote }}
      {{- end }}
      {{- if and .Values.databaseRoleProvisioning.enabled .Values.databaseRoleProvisioning.publishRuntimeSecret }}
      - {{ .Values.database.existingSecret | quote }}
      {{- end }}
    verbs: ["get"]
  {{- if and .Values.databaseRoleProvisioning.enabled .Values.databaseRoleProvisioning.publishRuntimeSecret }}
  # The role-provisioning hook promotes a verified candidate only into this
  # one stable runtime Secret. Kubernetes cannot scope `create` by name, but
  # update/patch are still confined to the exact target.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.database.existingSecret | quote }}]
    verbs: ["update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "apex.csiSyncRbacName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-hook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-30"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "apex.csiSyncRbacName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "apex.hookServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
