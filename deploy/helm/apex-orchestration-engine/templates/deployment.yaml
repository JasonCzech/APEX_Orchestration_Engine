apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "apex.fullname" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "apex.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Restart pods when non-secret settings change. Safe mid-run: the
        # checkpointed poll loop resumes (tests/integration/test_restart_survival.py).
        checksum/settings: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.databaseRoleProvisioning.credentialGeneration }}
        apex.io/database-credential-generation: {{ .Values.databaseRoleProvisioning.credentialGeneration | quote }}
        {{- end }}
        {{- if .Values.metrics.podAnnotations }}
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        prometheus.io/port: {{ .Values.containerPort | quote }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "apex.selectorLabels" . | nindent 8 }}
        {{- if .Values.workloadIdentity.enabled }}
        azure.workload.identity/use: "true"
        {{- end }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "apex.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.schemaReadiness.enabled }}
      initContainers:
        - name: schema-readiness
          image: {{ include "apex.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "apex.persistence.schema_readiness"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "apex.suffixedName" (dict "base" (include "apex.fullname" .) "suffix" "settings") }}
          env:
            - name: DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | quote }}
                  key: {{ required "database.uriKey is required" .Values.database.uriKey | quote }}
            - name: APEX_DATABASE__URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | quote }}
                  key: {{ required "database.apexUriKey is required" .Values.database.apexUriKey | quote }}
            - name: REDIS_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret | quote }}
                  key: {{ .Values.redis.uriKey | quote }}
            {{- include "apex.authEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.schemaReadiness.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: apex-server
          image: {{ include "apex.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "apex.suffixedName" (dict "base" (include "apex.fullname" .) "suffix" "settings") }}
          env:
            # LangGraph runtime: checkpoints/threads/runs live here — this is
            # what makes the replicas stateless and restart-safe.
            - name: DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | quote }}
                  key: {{ required "database.uriKey is required" .Values.database.uriKey | quote }}
            # APEX domain schema (asyncpg URI; usually the same database).
            - name: APEX_DATABASE__URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | quote }}
                  key: {{ required "database.apexUriKey is required" .Values.database.apexUriKey | quote }}
            - name: REDIS_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret | quote }}
                  key: {{ .Values.redis.uriKey | quote }}
            {{- include "apex.authEnv" . | nindent 12 }}
            {{- if .Values.license.existingSecret }}
            # REQUIRED in production: the standalone server does not boot
            # without an Enterprise license key (ADR-0001 / ADR-0003).
            - name: LANGGRAPH_CLOUD_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.license.existingSecret | quote }}
                  key: {{ .Values.license.secretKey | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          # The init container and application lifespan both verify the exact
          # Alembic head before the dependency-aware readiness probe can succeed.
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if eq .Values.secretBackend.mode "secretsStoreCSI" }}
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if eq .Values.secretBackend.mode "secretsStoreCSI" }}
        - name: secrets-store
          csi:
            driver: secrets-store.csi.x-k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "apex.akvSecretProviderClassName" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else if .Values.defaultPodAntiAffinity }}
      affinity:
        {{- include "apex.podAntiAffinity" . | nindent 8 }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml .Values.topologySpreadConstraints | nindent 8 }}
      {{- else if .Values.spreadConstraints.enabled }}
      topologySpreadConstraints:
        {{- include "apex.topologySpread" . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
