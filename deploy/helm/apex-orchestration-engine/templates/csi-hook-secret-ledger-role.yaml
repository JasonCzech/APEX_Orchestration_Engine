{{- if .Values.secretBackend.csi.cleanup.enabled -}}
{{- $name := include "apex.suffixedName" (dict "base" (include "apex.fullname" .) "suffix" "csi-hook-secret-ledger") -}}
{{- $runtimeSecrets := dict -}}
{{- range .Values.secretBackend.csi.objects -}}
{{- $_ := set $runtimeSecrets .secretName true -}}
{{- end -}}
{{- $ledgerSecrets := dict -}}
{{- range .Values.secretBackend.csi.hookObjects -}}
{{- if not (hasKey $runtimeSecrets .secretName) -}}
{{- $_ := set $ledgerSecrets .secretName true -}}
{{- end -}}
{{- end -}}
{{- range .Values.secretBackend.csi.cleanup.previousHookSecretNames -}}
{{- $_ := set $ledgerSecrets . true -}}
{{- end -}}
# This Role is deliberately left unbound between releases. During the next
# pre-upgrade hook, a temporary RoleBinding uses these exact resourceNames as a
# trusted prior-release ledger; Helm updates the Role only after hooks succeed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-hook-secret-ledger
rules:
  {{- if $ledgerSecrets }}
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- range (keys $ledgerSecrets | sortAlpha) }}
      - {{ . | quote }}
      {{- end }}
    verbs: ["get", "delete"]
  {{- else }}
  []
  {{- end }}
{{- end }}
