{{- if eq .Values.secretBackend.mode "secretsStoreCSI" -}}
# A hook-scoped view of the runtime vault. The pre-upgrade sync Job mounts this
# alongside the hook vault so the native runtime Secrets are refreshed before a
# versioned database role is provisioned and before the Deployment rolls.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "apex.hookRuntimeAkVSecretProviderClassName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-runtime-hook
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-24"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "apex.hookWorkloadIdentityClientId" . | quote }}
    keyvaultName: {{ required "secretBackend.csi.keyvaultName is required for secretsStoreCSI" .Values.secretBackend.csi.keyvaultName | quote }}
    tenantId: {{ required "secretBackend.csi.tenantId is required for secretsStoreCSI" .Values.secretBackend.csi.tenantId | quote }}
    cloudName: {{ .Values.secretBackend.csi.cloudName | quote }}
    objects: |
      array:
        {{- range .Values.secretBackend.csi.objects }}
        - |
          objectName: {{ .objectName | quote }}
          objectType: secret
        {{- end }}
  secretObjects:
    {{- $grouped := dict }}
    {{- range .Values.secretBackend.csi.objects }}
    {{- $existing := index $grouped .secretName | default (list) }}
    {{- $_ := set $grouped .secretName (append $existing (dict "objectName" .objectName "key" .key)) }}
    {{- end }}
    {{- range $secretName, $entries := $grouped }}
    - secretName: {{ $secretName | quote }}
      type: Opaque
      data:
        {{- range $entries }}
        - objectName: {{ .objectName | quote }}
          key: {{ .key | quote }}
        {{- end }}
    {{- end }}
{{- end }}
