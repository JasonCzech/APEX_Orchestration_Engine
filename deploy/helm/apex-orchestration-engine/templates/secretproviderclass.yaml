{{- if eq .Values.secretBackend.mode "secretsStoreCSI" -}}
# Azure Key Vault via the Secrets Store CSI driver. `secretObjects` synthesize the
# SAME K8s Secret names/keys the Deployment already consumes, so switching backends
# needs no change to the env wiring. Pods must MOUNT the CSI volume (deployment.yaml
# does so in this mode) for the sync to fire. Auth is via workload identity.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "apex.akvSecretProviderClassName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ include "apex.workloadIdentityClientId" . | quote }}
    keyvaultName: {{ required "secretBackend.csi.keyvaultName is required for secretsStoreCSI" .Values.secretBackend.csi.keyvaultName | quote }}
    tenantId: {{ required "secretBackend.csi.tenantId is required for secretsStoreCSI" .Values.secretBackend.csi.tenantId | quote }}
    cloudName: {{ .Values.secretBackend.csi.cloudName | quote }}
    objects: |
      array:
        {{- range .Values.secretBackend.csi.objects }}
        - |
          objectName: {{ .objectName }}
          objectType: secret
        {{- end }}
  secretObjects:
    {{- $grouped := dict }}
    {{- range .Values.secretBackend.csi.objects }}
    {{- $existing := index $grouped .secretName | default (list) }}
    {{- $_ := set $grouped .secretName (append $existing (dict "objectName" .objectName "key" .key)) }}
    {{- end }}
    {{- range $secretName, $entries := $grouped }}
    - secretName: {{ $secretName }}
      type: Opaque
      data:
        {{- range $entries }}
        - objectName: {{ .objectName }}
          key: {{ .key }}
        {{- end }}
    {{- end }}
{{- end }}
