{{- if .Values.backupWorkloadIdentity.enabled -}}
{{- $clientId := required "backupWorkloadIdentity.clientId is required when enabled" .Values.backupWorkloadIdentity.clientId -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "apex.backupServiceAccountName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: artifact-backup
  annotations:
    azure.workload.identity/client-id: {{ $clientId | quote }}
automountServiceAccountToken: false
{{- end }}
