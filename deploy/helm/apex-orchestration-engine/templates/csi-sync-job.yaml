{{- if eq .Values.secretBackend.mode "secretsStoreCSI" -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "apex.fullname" . }}-csi-sync
  labels:
    {{- include "apex.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi-sync
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": {{ .Values.secretBackend.csi.syncJob.hookDeletePolicy }}
spec:
  backoffLimit: {{ .Values.secretBackend.csi.syncJob.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.secretBackend.csi.syncJob.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "apex.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: csi-sync
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "apex.hookServiceAccountName" . | quote }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sync
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["python", "-c"]
          args:
            - |
              from pathlib import Path

              mounted = [path for path in Path("/mnt/secrets-store").iterdir() if path.is_file()]
              expected = {{ len .Values.secretBackend.csi.objects }}
              if len(mounted) < expected:
                  raise SystemExit(f"CSI mounted {len(mounted)} object(s); expected {expected}")
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.x-k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "apex.hookAkVSecretProviderClassName" . }}
        - name: tmp
          emptyDir: {}
{{- end }}
