{{- if .Values.serviceAccount.create -}}
{{- $wiClientId := include "apex.workloadIdentityClientId" . -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "apex.serviceAccountName" . }}
  labels:
    {{- include "apex.labels" . | nindent 4 }}
  {{- if or .Values.serviceAccount.annotations (and .Values.workloadIdentity.enabled $wiClientId) }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.workloadIdentity.enabled $wiClientId }}
    azure.workload.identity/client-id: {{ $wiClientId | quote }}
    {{- end }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
