# CI render fixture for secretBackend.mode=externalSecrets (helm template -f).
secretBackend:
  mode: externalSecrets
  externalSecrets:
    refreshInterval: 1h
    secretStoreRef:
      name: azure-kv-store
      kind: ClusterSecretStore
    targets:
      - name: apex-database
        data:
          - { secretKey: DATABASE_URI, remoteKey: database-uri }
          - { secretKey: APEX_DATABASE__URI, remoteKey: apex-database-uri }
      - name: apex-redis
        data:
          - { secretKey: REDIS_URI, remoteKey: redis-uri }
      - name: apex-langgraph-license
        data:
          - { secretKey: LANGGRAPH_CLOUD_LICENSE_KEY, remoteKey: langgraph-license }
