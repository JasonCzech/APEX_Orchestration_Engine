# Security boundary for the archived MinIO OSS server.
#
# GHSA-hv4r-mvr4-25vw / CVE-2026-41145: the primary advisory requires blocking
# STREAMING-UNSIGNED-PAYLOAD-TRAILER when an immediate AIStor migration is not
# possible. GHSA-h749-fxx7-pwpg / CVE-2026-39414 likewise requires blocking S3
# Select POST requests. MinIO itself binds only to 127.0.0.1:9100; all remote
# traffic must pass these fail-closed rules.

worker_processes auto;
pid /tmp/nginx.pid;
# Nginx's fixed error-log format can append the raw request line at every
# severity. It cannot be made credential-safe, so disable it; Kubernetes probe,
# exit status, and the query-free access log remain available operationally.
error_log /dev/null;

events {
    worker_connections 1024;
}

http {
    # Never use nginx's default combined format here: `$request` contains the
    # raw query string and therefore reusable presigned credentials. JSON
    # escaping also prevents attacker-controlled object keys from forging logs.
    log_format apex_safe escape=json
        '{"remote_addr":"$remote_addr","time":"$time_iso8601",'
        '"method":"$request_method","uri":"$uri",'
        '"protocol":"$server_protocol","status":$status,'
        '"bytes_sent":$body_bytes_sent}';
    access_log /dev/stdout apex_safe;
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    map $http_x_amz_content_sha256 $block_unsigned_trailer {
        default 0;
        ~*STREAMING-UNSIGNED-PAYLOAD-TRAILER 1;
    }

    map $args $has_s3_select_argument {
        default 0;
        ~*(^|&)select(?:=|&|$) 1;
    }

    map "$request_method:$has_s3_select_argument" $block_s3_select {
        default 0;
        "POST:1" 1;
    }

    # Fail closed for percent-encoded or otherwise non-canonical query names:
    # only POST shapes required by ordinary S3 multipart/delete operations pass.
    # A SelectObjectContent request cannot smuggle an encoded `select` token by
    # appending it to one of these full-query allowlist forms.
    map $args $allowed_s3_post_arguments {
        default 0;
        ~*^(uploads=?|delete=?|uploadId=[^&]+)$ 1;
    }

    map "$request_method:$allowed_s3_post_arguments" $block_unapproved_s3_post {
        default 0;
        "POST:0" 1;
    }

    server {
        listen 9000 default_server;
        server_name _;
        client_max_body_size 0;
        recursive_error_pages off;

        if ($block_unsigned_trailer) {
            return 403;
        }
        if ($block_s3_select) {
            return 403;
        }
        if ($block_unapproved_s3_post) {
            return 403;
        }

        location / {
            proxy_pass http://127.0.0.1:9100;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_pass_request_headers on;
            proxy_request_buffering off;
            proxy_buffering off;
            # Do not relay an upstream 5xx body that could echo a canonical
            # request/query during signature or proxy failures.
            proxy_intercept_errors on;
            error_page 500 502 503 504 = @sanitized_upstream_error;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5m;
            proxy_send_timeout 5m;
        }

        location @sanitized_upstream_error {
            default_type text/plain;
            return 502 "S3 gateway upstream unavailable\n";
        }
    }
}
