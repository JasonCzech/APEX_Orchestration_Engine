# HA soak rig: 2 stateless apex-server replicas behind nginx round-robin,
# sharing one Postgres/Redis/MinIO. Procedure: see README.md in this directory.
#
# ── HARD PREREQUISITE (the rig is ready-to-run but gated on this) ────────────
# LANGGRAPH_CLOUD_LICENSE_KEY — the standalone LangGraph server image does not
# boot without it, and the custom auth this app ships requires the Self-Hosted
# Enterprise tier (ADR-0001, ADR-0003). Compose fails fast below if it is unset.
#
# Build the image first:
#   uv run langgraph build -t "${APEX_IMAGE:-apex-orchestration-engine:local}"

x-apex-server: &apex-server
  image: ${APEX_IMAGE:-apex-orchestration-engine:local}
  environment:
    DATABASE_URI: postgresql://apex:${APEX_POSTGRES_PASSWORD:-apex}@postgres:5432/apex
    REDIS_URI: redis://redis:6379
    LANGGRAPH_CLOUD_LICENSE_KEY: ${LANGGRAPH_CLOUD_LICENSE_KEY:?Enterprise license required (ADR-0001) - see deploy/compose-ha/README.md}
    APEX_ENVIRONMENT: compose-ha
    APEX_DATABASE__URI: postgresql+asyncpg://apex:${APEX_POSTGRES_PASSWORD:-apex}@postgres:5432/apex
    # Rig-only synthetic admin key. Supply it via environment or .env.local; do
    # not commit a working admin key.
    APEX_AUTH__DEV_API_KEY: ${APEX_AUTH__DEV_API_KEY:?Set a rig-only admin key outside git}
    # Secret for the seeded "minio-artifacts" connection (matches MinIO below).
    APEX_MINIO_SECRET_KEY: ${APEX_MINIO_SECRET_KEY:-apex-minio}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: ${APEX_POSTGRES_PASSWORD:-apex}
      POSTGRES_DB: apex
    ports:
      - "5433:5432" # host port for migrations/seeding (5433 avoids the dev compose)
    volumes:
      - pgdata-ha:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data
    environment:
      MINIO_ROOT_USER: apex
      MINIO_ROOT_PASSWORD: ${APEX_MINIO_SECRET_KEY:-apex-minio}
    volumes:
      - miniodata-ha:/data

  apex-server-1:
    <<: *apex-server

  apex-server-2:
    <<: *apex-server

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8123:8123"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - apex-server-1
      - apex-server-2

volumes:
  pgdata-ha:
  miniodata-ha:
