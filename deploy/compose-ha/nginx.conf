# Round-robin LB for the HA soak rig. SSE-safe: buffering/caching off, long
# read timeouts — a buffered hop silently stalls live run streams.
events {
    worker_connections 1024;
}

http {
    upstream apex {
        # Round-robin (default). No sticky sessions needed: replicas are
        # stateless; resumable SSE goes through Redis pub-sub, so a rejoined
        # stream works from either replica.
        server apex-server-1:8000 max_fails=2 fail_timeout=5s;
        server apex-server-2:8000 max_fails=2 fail_timeout=5s;
    }

    server {
        listen 8123;

        location / {
            proxy_pass http://apex;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE: stream bytes as they arrive, never buffer or cache.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
        }
    }
}
