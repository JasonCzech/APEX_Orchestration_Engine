# Full stack: infra + the LangGraph standalone server image.
# Build the server image first:
#   uv run langgraph build -t "${APEX_IMAGE:-apex-orchestration-engine:local}"
# Production note: the standalone server requires LANGGRAPH_CLOUD_LICENSE_KEY (see plan/ADR-0001).
#
# Secrets/credentials are NOT inlined: they come from the shell environment or an
# auto-loaded `.env` via ${VAR:-default} interpolation (same pattern as the HA rig,
# deploy/compose-ha/docker-compose.ha.yaml). Override before `docker compose up`:
#   APEX_POSTGRES_PASSWORD=… APEX_INTEGRATION_MINIO_SECRET_KEY=…
#   APEX_BOOTSTRAP_ADMIN_KEY=… LANGGRAPH_CLOUD_LICENSE_KEY=…
# NOTE: do not point apex-server at the dev `.env` URIs (they use localhost); the
# container reaches its dependencies by compose service name (postgres/redis/minio).
services:
  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: unless-stopped
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: ${APEX_POSTGRES_PASSWORD:-apex}
      POSTGRES_DB: apex
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1g

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m

  minio:
    image: nginxinc/nginx-unprivileged:1.31.2-alpine3.23@sha256:6320020c7da8714feab524e02c08c5a1958675c4e68700e93a2fd8970b065786
    restart: unless-stopped
    volumes:
      - ./deploy/minio-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m

  # The archived MinIO OSS server is deliberately absent from Compose DNS and
  # binds only to loopback in the gateway's shared network namespace. This
  # makes bypassing the advisory-prescribed request filters fail closed.
  minio-storage:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z@sha256:77ff9f7e12549d269990b167fa21da010fa8b0beb40d6064569b8887e37c456b
    restart: unless-stopped
    network_mode: "service:minio"
    command: server /data --address 127.0.0.1:9100 --console-address 127.0.0.1:9101
    environment:
      MINIO_ROOT_USER: apex
      MINIO_ROOT_PASSWORD: ${APEX_INTEGRATION_MINIO_SECRET_KEY:-apex-minio}
    volumes:
      - miniodata:/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1g

  apex-server:
    image: ${APEX_IMAGE:-apex-orchestration-engine:local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8123:8000"
    environment:
      DATABASE_URI: postgresql://apex:${APEX_POSTGRES_PASSWORD:-apex}@postgres:5432/apex
      REDIS_URI: redis://redis:6379
      FF_V2_EVENT_STREAMING: "false"
      HTTP_MAX_REQUEST_BODY_BYTES: "27262976"
      CORS_CONFIG: '{"allow_origins":["http://localhost:5173","http://127.0.0.1:5173"],"allow_methods":["GET","POST","PUT","PATCH","DELETE","OPTIONS"],"allow_headers":["authorization","content-type","idempotency-key","last-event-id","x-api-key","x-request-id"],"allow_credentials":true,"expose_headers":["content-location","retry-after","x-pagination-next","x-pagination-total"],"max_age":600}'
      APEX_RATE_LIMIT__RUN_CREATE_REQUESTS: "10"
      APEX_RATE_LIMIT__RUN_CREATE_WINDOW_S: "60"
      APEX_ENVIRONMENT: compose
      # Compose service DNS names are remote from the process but the bundled
      # postgres:16 image is intentionally plaintext on the private bridge.
      APEX_DATABASE__SSL_MODE: disable
      # The dashboard reverse proxy is the trusted hop that forwards the
      # browser's address. Without this, all auth failures share the proxy
      # container's lockout bucket.
      APEX_RATE_LIMIT__TRUSTED_PROXY_CIDRS: '["172.16.0.0/12"]'
      APEX_DATABASE__URI: postgresql+asyncpg://apex:${APEX_POSTGRES_PASSWORD:-apex}@postgres:5432/apex
      APEX_INTEGRATION_MINIO_SECRET_KEY: ${APEX_INTEGRATION_MINIO_SECRET_KEY:-apex-minio}
      # Required for the standalone server to boot (Enterprise). Empty = unset.
      LANGGRAPH_CLOUD_LICENSE_KEY: ${LANGGRAPH_CLOUD_LICENSE_KEY:-}
    healthcheck:
      # In-image Python (no curl in the langgraph base image); urlopen raises on non-2xx.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    image: ${APEX_DASHBOARD_IMAGE:-apex-dashboard:local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      # Same-origin: reverse-proxy API paths to the server, so the SPA's
      # config.json origins stay empty (no CORS, SSE works).
      BACKEND_UPSTREAM: http://apex-server:8000
    depends_on:
      apex-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/config.json"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256m

  migrate:
    image: ${APEX_IMAGE:-apex-orchestration-engine:local}
    restart: "no"
    entrypoint: ["python", "-m", "apex.persistence.migrate"]
    environment:
      APEX_ENVIRONMENT: compose
      APEX_DATABASE__URI: postgresql+asyncpg://apex:${APEX_POSTGRES_PASSWORD:-apex}@postgres:5432/apex
      APEX_DATABASE__SSL_MODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  bootstrap:
    image: ${APEX_IMAGE:-apex-orchestration-engine:local}
    restart: "no"
    entrypoint: ["python", "-m", "apex.bootstrap"]
    command: ["/bootstrap/bootstrap.json"]
    environment:
      APEX_ENVIRONMENT: compose
      APEX_DATABASE__URI: postgresql+asyncpg://apex:${APEX_POSTGRES_PASSWORD:-apex}@postgres:5432/apex
      APEX_DATABASE__SSL_MODE: disable
      APEX_BOOTSTRAP_ADMIN_KEY: ${APEX_BOOTSTRAP_ADMIN_KEY:-apex-local-admin-key}
      APEX_INTEGRATION_MINIO_SECRET_KEY: ${APEX_INTEGRATION_MINIO_SECRET_KEY:-apex-minio}
    volumes:
      - ./deploy/bootstrap/compose.json:/bootstrap/bootstrap.json:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
