# Full stack: infra + the LangGraph standalone server image.
# Build the server image first:  langgraph build -t apex-orchestration-engine
# Production note: the standalone server requires LANGGRAPH_CLOUD_LICENSE_KEY (see plan/ADR-0001).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex
      POSTGRES_DB: apex
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: apex
      MINIO_ROOT_PASSWORD: apex-minio
    volumes:
      - miniodata:/data

  apex-server:
    image: apex-orchestration-engine:latest
    ports:
      - "8123:8000"
    environment:
      DATABASE_URI: postgresql://apex:apex@postgres:5432/apex
      REDIS_URI: redis://redis:6379
      APEX_ENVIRONMENT: compose
      APEX_DATABASE__URI: postgresql+asyncpg://apex:apex@postgres:5432/apex
      # LANGGRAPH_CLOUD_LICENSE_KEY: ${LANGGRAPH_CLOUD_LICENSE_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
