name: release

# Tag-driven release: full quality gates, then three artifact tracks (server
# image, TypeScript SDK, Helm chart). Every track always uploads a workflow
# artifact; the push/publish steps are gated on the corresponding secrets being
# configured and skip loudly when they are not — no registry credentials are
# assumed to exist.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - run: uv run pytest --cov=src/apex --cov-report=term-missing --cov-fail-under=88
      - run: uv run pip-audit
      - name: OpenAPI contract drift gate
        run: |
          uv run python scripts/export_openapi.py
          git diff --exit-code docs/api/

  server-image:
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: Build standalone server image (langgraph build)
        run: uv run langgraph build -t "apex-orchestration-engine:${GITHUB_REF_NAME}"
      - name: Save image as artifact
        run: |
          mkdir -p dist
          docker save "apex-orchestration-engine:${GITHUB_REF_NAME}" \
            | gzip > "dist/apex-orchestration-engine-${GITHUB_REF_NAME}.tar.gz"
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: "apex-orchestration-engine:${GITHUB_REF_NAME}"
          output-file: "dist/apex-orchestration-engine-${GITHUB_REF_NAME}.spdx.json"
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: "dist/apex-orchestration-engine-${GITHUB_REF_NAME}.tar.gz"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: server-image
          path: dist/*
          retention-days: 30
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - name: Detect registry credentials
        id: registry
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [[ -n "$REGISTRY_URL" && -n "$REGISTRY_USERNAME" && -n "$REGISTRY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::REGISTRY_URL/REGISTRY_USERNAME/REGISTRY_PASSWORD secrets not configured — skipping image push. The image is still attached as the 'server-image' workflow artifact."
          fi
      - name: Push image to registry
        id: push-image
        if: steps.registry.outputs.available == 'true'
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_URL" -u "$REGISTRY_USERNAME" --password-stdin
          docker tag "apex-orchestration-engine:${GITHUB_REF_NAME}" \
            "$REGISTRY_URL/apex-orchestration-engine:${GITHUB_REF_NAME}"
          image_ref="$REGISTRY_URL/apex-orchestration-engine:${GITHUB_REF_NAME}"
          docker push "$image_ref"
          image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image_ref")"
          echo "image_subject=$REGISTRY_URL/apex-orchestration-engine" >> "$GITHUB_OUTPUT"
          echo "image_digest=${image_digest#*@}" >> "$GITHUB_OUTPUT"
          cosign sign --yes "$image_digest"
          cosign attest --yes \
            --type spdxjson \
            --predicate "dist/apex-orchestration-engine-${GITHUB_REF_NAME}.spdx.json" \
            "$image_digest"
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        if: steps.registry.outputs.available == 'true'
        with:
          subject-name: ${{ steps.push-image.outputs.image_subject }}
          subject-digest: ${{ steps.push-image.outputs.image_digest }}
          push-to-registry: true

  dashboard-image:
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build dashboard image (context = repo root)
        run: docker build -f apps/dashboard/Dockerfile -t "apex-dashboard:${GITHUB_REF_NAME}" .
      - name: Save image as artifact
        run: |
          mkdir -p dist
          docker save "apex-dashboard:${GITHUB_REF_NAME}" \
            | gzip > "dist/apex-dashboard-${GITHUB_REF_NAME}.tar.gz"
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: "apex-dashboard:${GITHUB_REF_NAME}"
          output-file: "dist/apex-dashboard-${GITHUB_REF_NAME}.spdx.json"
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: "dist/apex-dashboard-${GITHUB_REF_NAME}.tar.gz"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dashboard-image
          path: dist/*
          retention-days: 30
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - name: Detect registry credentials
        id: registry
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [[ -n "$REGISTRY_URL" && -n "$REGISTRY_USERNAME" && -n "$REGISTRY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::REGISTRY_URL/REGISTRY_USERNAME/REGISTRY_PASSWORD secrets not configured — skipping dashboard image push. The image is still attached as the 'dashboard-image' workflow artifact."
          fi
      - name: Push image to registry
        id: push-image
        if: steps.registry.outputs.available == 'true'
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_URL" -u "$REGISTRY_USERNAME" --password-stdin
          docker tag "apex-dashboard:${GITHUB_REF_NAME}" \
            "$REGISTRY_URL/apex-dashboard:${GITHUB_REF_NAME}"
          image_ref="$REGISTRY_URL/apex-dashboard:${GITHUB_REF_NAME}"
          docker push "$image_ref"
          image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$image_ref")"
          echo "image_subject=$REGISTRY_URL/apex-dashboard" >> "$GITHUB_OUTPUT"
          echo "image_digest=${image_digest#*@}" >> "$GITHUB_OUTPUT"
          cosign sign --yes "$image_digest"
          cosign attest --yes \
            --type spdxjson \
            --predicate "dist/apex-dashboard-${GITHUB_REF_NAME}.spdx.json" \
            "$image_digest"
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        if: steps.registry.outputs.available == 'true'
        with:
          subject-name: ${{ steps.push-image.outputs.image_subject }}
          subject-digest: ${{ steps.push-image.outputs.image_digest }}
          push-to-registry: true

  sdk:
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Regenerate @apex/api-client types from the committed spec
        run: bash scripts/generate_sdks.sh
      - name: Generated-types drift gate (types move in lockstep with the spec)
        run: git diff --exit-code packages/api-client/src/schema.d.ts
      - run: npm run -w @apex/api-client typecheck
      - name: npm pack
        run: |
          mkdir -p dist
          (cd packages/api-client && npm pack --pack-destination ../../dist)
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: "dist/*.tgz"
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - name: Sign npm tarball
        run: |
          for artifact in dist/*.tgz; do
            cosign sign-blob --yes --bundle "${artifact}.bundle" "$artifact"
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-client
          path: dist/*
          retention-days: 30
      - name: Detect npm token
        id: npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "$NPM_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::NPM_TOKEN secret not configured — skipping npm publish. The tarball is still attached as the 'api-client' workflow artifact."
          fi
      # Note: packages/api-client/package.json is "private": true until the npm
      # org/scope decision lands — npm refuses to publish private packages, so
      # this step is double-gated by design. Flip "private" when publishing for real.
      - name: Publish to npm
        if: steps.npm.outputs.available == 'true'
        working-directory: packages/api-client
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm publish

  helm-chart:
    needs: gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
      - name: Helm lint
        run: helm lint deploy/helm/apex-orchestration-engine
      - name: Helm package
        run: |
          mkdir -p dist
          helm package deploy/helm/apex-orchestration-engine \
            --app-version "${GITHUB_REF_NAME#v}" \
            --destination dist
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: deploy/helm/apex-orchestration-engine
          output-file: "dist/apex-orchestration-engine-chart-${GITHUB_REF_NAME}.spdx.json"
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: "dist/*.tgz"
      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - name: Sign Helm chart
        run: |
          for artifact in dist/*.tgz; do
            cosign sign-blob --yes --bundle "${artifact}.bundle" "$artifact"
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: helm-chart
          path: dist/*
          retention-days: 30
