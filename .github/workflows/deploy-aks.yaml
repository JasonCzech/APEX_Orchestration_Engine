name: deploy-aks

# Manual, environment-gated deploy to AKS. Auth is OIDC (federated) — no stored
# cloud credentials. Configure per GitHub Environment:
#   vars:    AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
#            AZURE_TFSTATE_RG, AZURE_TFSTATE_SA
#   secrets: PG_ADMIN_PASSWORD, LANGGRAPH_CLOUD_LICENSE_KEY, APEX_MINIO_SECRET_KEY
# The AZURE_CLIENT_ID is a *deployer* identity federated to this repo+environment
# (distinct from the in-cluster workload identity Terraform creates).
#
# Ordering enforces migrate-then-roll: the Helm pre-upgrade hooks run alembic and
# the bootstrap Job before the Deployment rolls; `helm upgrade --wait` gates on them.
# Rollback: `helm rollback <release>` (migrations are additive — old code is safe on
# the newer schema; see docs/runbooks/deployment.md).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod]
      hostname:
        description: Public HTTPS hostname for APEX
        required: true
        type: string
      tls_secret_name:
        description: Existing Kubernetes TLS Secret for the hostname
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: apex-deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  TF_DIR: deploy/terraform
  NAMESPACE: apex
  RELEASE: apex

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - run: uv run pytest tests/unit -q

  provision:
    needs: verify
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      acr: ${{ steps.tf.outputs.acr }}
      aks: ${{ steps.tf.outputs.aks }}
      rg: ${{ steps.tf.outputs.rg }}
      kv: ${{ steps.tf.outputs.kv }}
      tenant: ${{ steps.tf.outputs.tenant }}
      client_id: ${{ steps.tf.outputs.client_id }}
      service_account: ${{ steps.tf.outputs.service_account }}
      hook_service_account: ${{ steps.tf.outputs.hook_service_account }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
      - name: Terraform init (remote state)
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_USE_OIDC: "true"
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${{ vars.AZURE_TFSTATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.AZURE_TFSTATE_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=apex-${{ inputs.environment }}.tfstate"
      - name: Terraform plan + apply
        id: tf
        working-directory: ${{ env.TF_DIR }}
        env:
          ARM_USE_OIDC: "true"
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_postgres_admin_password: ${{ secrets.PG_ADMIN_PASSWORD }}
          TF_VAR_langgraph_license_key: ${{ secrets.LANGGRAPH_CLOUD_LICENSE_KEY }}
          TF_VAR_artifact_store_secret: ${{ secrets.APEX_MINIO_SECRET_KEY }}
          TF_VAR_bootstrap_admin_key: ${{ secrets.APEX_BOOTSTRAP_ADMIN_KEY }}
          TF_VAR_api_key_hash_pepper: ${{ secrets.APEX_API_KEY_HASH_PEPPER }}
          TF_VAR_previous_api_key_hash_peppers: ${{ secrets.APEX_PREVIOUS_API_KEY_HASH_PEPPERS || '[]' }}
          TF_VAR_workload_namespace: ${{ env.NAMESPACE }}
        run: |
          terraform plan -input=false -out=tfplan -var-file="env/${{ inputs.environment }}.tfvars"
          terraform apply -input=false -auto-approve tfplan
          {
            echo "acr=$(terraform output -raw acr_login_server)"
            echo "aks=$(terraform output -raw aks_cluster_name)"
            echo "rg=$(terraform output -raw resource_group)"
            echo "kv=$(terraform output -raw key_vault_name)"
            echo "tenant=$(terraform output -raw tenant_id)"
            echo "client_id=$(terraform output -raw workload_identity_client_id)"
            echo "service_account=$(terraform output -raw workload_service_account)"
            echo "hook_service_account=$(terraform output -raw workload_hook_service_account)"
          } >> "$GITHUB_OUTPUT"

  build-push:
    needs: [provision, verify]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: ACR login
        run: az acr login --name "$(echo '${{ needs.provision.outputs.acr }}' | cut -d. -f1)"
      - name: Build + push images
        env:
          ACR: ${{ needs.provision.outputs.acr }}
          TAG: sha-${{ github.sha }}
        run: |
          uv run langgraph build -t "$ACR/apex-orchestration-engine:$TAG"
          docker build -f apps/dashboard/Dockerfile -t "$ACR/apex-dashboard:$TAG" .
          docker push "$ACR/apex-orchestration-engine:$TAG"
          docker push "$ACR/apex-dashboard:$TAG"

  deploy:
    needs: [provision, build-push]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
      - name: Cluster credentials
        run: az aks get-credentials --resource-group "${{ needs.provision.outputs.rg }}" --name "${{ needs.provision.outputs.aks }}" --overwrite-existing
      - name: Prepare namespace and CSI API
        env:
          TLS_SECRET_NAME: ${{ inputs.tls_secret_name }}
        run: |
          validate_dns_subdomain() {
            local value="$1" label
            [[ ${#value} -le 253 && "$value" =~ ^[a-z0-9]([a-z0-9.-]*[a-z0-9])?$ ]] || return 1
            IFS='.' read -ra labels <<< "$value"
            for label in "${labels[@]}"; do
              [[ ${#label} -le 63 && "$label" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]] || return 1
            done
          }
          if ! validate_dns_subdomain "$TLS_SECRET_NAME"; then
            echo "tls_secret_name must be a Kubernetes DNS subdomain" >&2
            exit 2
          fi
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl wait --for=condition=Established \
            crd/secretproviderclasses.secrets-store.csi.x-k8s.io --timeout=5m
          kubectl -n "$NAMESPACE" get secret "$TLS_SECRET_NAME"
      - name: Helm upgrade (migrate + bootstrap hooks run first)
        env:
          ACR: ${{ needs.provision.outputs.acr }}
          TAG: sha-${{ github.sha }}
          APEX_HOSTNAME: ${{ inputs.hostname }}
          TLS_SECRET_NAME: ${{ inputs.tls_secret_name }}
        run: |
          validate_dns_hostname() {
            local value="$1" label
            [[ ${#value} -le 253 && "$value" =~ ^[a-z0-9]([a-z0-9.-]*[a-z0-9])?$ ]] || return 1
            IFS='.' read -ra labels <<< "$value"
            for label in "${labels[@]}"; do
              [[ ${#label} -le 63 && "$label" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]] || return 1
            done
          }
          if ! validate_dns_hostname "$APEX_HOSTNAME"; then
            echo "hostname must be a lowercase DNS hostname" >&2
            exit 2
          fi
          CHART_NAME="apex-orchestration-engine"
          if [[ "$RELEASE" == *"$CHART_NAME"* ]]; then
            FULLNAME="$RELEASE"
          else
            FULLNAME="$RELEASE-$CHART_NAME"
          fi
          FULLNAME="${FULLNAME:0:63}"
          FULLNAME="${FULLNAME%-}"
          DASHBOARD_NAME="${FULLNAME}-dashboard"
          DASHBOARD_NAME="${DASHBOARD_NAME:0:63}"
          DASHBOARD_NAME="${DASHBOARD_NAME%-}"
          helm upgrade --install "$RELEASE" deploy/helm/apex-orchestration-engine \
            -n "$NAMESPACE" --create-namespace \
            -f deploy/azure/helm/values-azure.yaml \
            --set image.repository="$ACR/apex-orchestration-engine" \
            --set image.tag="$TAG" \
            --set dashboard.image.repository="$ACR/apex-dashboard" \
            --set dashboard.image.tag="$TAG" \
            --set-string dashboard.backendUpstream="http://$FULLNAME:80" \
            --set-string bootstrap.document.connections[0].options.endpoint="apex-minio:9000" \
            --set-string "ingress.hosts[0].host=$APEX_HOSTNAME" \
            --set-string "ingress.tls[0].hosts[0]=$APEX_HOSTNAME" \
            --set-string "ingress.tls[0].secretName=$TLS_SECRET_NAME" \
            --set-string "apexSettings.APEX_CORS_ORIGINS=[\"https://$APEX_HOSTNAME\"]" \
            --set secretBackend.csi.keyvaultName="${{ needs.provision.outputs.kv }}" \
            --set secretBackend.csi.tenantId="${{ needs.provision.outputs.tenant }}" \
            --set workloadIdentity.clientId="${{ needs.provision.outputs.client_id }}" \
            --set serviceAccount.name="${{ needs.provision.outputs.service_account }}" \
            --set hookServiceAccountName="${{ needs.provision.outputs.hook_service_account }}" \
            --wait --timeout 15m
          kubectl -n "$NAMESPACE" rollout restart \
            "deployment/$FULLNAME" \
            "deployment/$DASHBOARD_NAME"
          kubectl -n "$NAMESPACE" rollout status "deployment/$FULLNAME"
          kubectl -n "$NAMESPACE" rollout status "deployment/$DASHBOARD_NAME"
      - name: MinIO artifact store
        run: |
          kubectl apply -n "$NAMESPACE" -f deploy/azure/k8s/minio/minio.yaml
          kubectl -n "$NAMESPACE" rollout restart deployment/apex-minio
          kubectl -n "$NAMESPACE" rollout status deployment/apex-minio --timeout=5m
          kubectl apply -n "$NAMESPACE" -f deploy/azure/k8s/minio/backup-cronjob.yaml
      - name: Smoke test
        run: helm test "$RELEASE" -n "$NAMESPACE"
