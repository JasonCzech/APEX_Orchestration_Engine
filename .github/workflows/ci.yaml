name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright
      - run: uv run pytest --cov=src/apex --cov-report=term-missing --cov-fail-under=88
      - name: OpenAPI contract drift gate
        run: |
          uv run python scripts/export_openapi.py
          git diff --exit-code docs/api/
      - name: Python dependency audit
        run: uv run pip-audit

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run -w @apex/pipeline-events typecheck
      - run: npm run -w @apex/pipeline-events test
      - name: Generated-types drift gate
        run: |
          npm run generate:sdks
          git diff --exit-code packages/api-client/src/schema.d.ts
      - run: npm run -w @apex/api-client typecheck
      - run: npm run -w @apex/dashboard typecheck
      - run: npm run -w @apex/dashboard lint
      - run: npm run -w @apex/dashboard test
      - run: npm run -w @apex/dashboard test:coverage
      - run: npm run -w @apex/dashboard build

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz kubeconform
          sudo install kubeconform /usr/local/bin/
      - name: Lint (strict)
        run: helm lint --strict deploy/helm/apex-orchestration-engine
      - name: Render every variant + schema-validate
        run: |
          CHART=deploy/helm/apex-orchestration-engine
          out=/tmp/manifests
          mkdir -p "$out"
          render() { helm template smoke "$CHART" "$@"; }
          render > "$out/default.yaml"
          render --set migrations.enabled=true --set bootstrap.enabled=true \
            --set bootstrap.adminKeySecret.existingSecret=apex-admin > "$out/jobs.yaml"
          render --set ingress.enabled=true --set autoscaling.enabled=true > "$out/ingress.yaml"
          render --set gateway.enabled=true --set gateway.gatewayName=gw \
            --set ingress.enabled=false > "$out/gateway.yaml"
          render --set networkPolicy.enabled=true \
            --set networkPolicy.egress.allowAll=true > "$out/netpol.yaml"
          render --set serviceAccount.create=true --set rbac.create=true \
            --set rbac.clusterScope=true > "$out/rbac.yaml"
          render --set secretBackend.mode=secretsStoreCSI \
            --set secretBackend.csi.keyvaultName=kv --set secretBackend.csi.tenantId=t \
            --set workloadIdentity.enabled=true --set workloadIdentity.clientId=c > "$out/csi.yaml"
          render -f "$CHART/ci/external-secrets-values.yaml" > "$out/eso.yaml"
          render --set metrics.serviceMonitor.enabled=true \
            --set metrics.podAnnotations=true > "$out/metrics.yaml"
          render --set dashboard.enabled=true \
            --set dashboard.backendUpstream=http://apex:80 > "$out/dashboard.yaml"
          # Validate core resources against upstream schemas; CRDs (SecretProviderClass,
          # ExternalSecret, ServiceMonitor, HTTPRoute) have no public schema -> skip them.
          kubeconform -strict -ignore-missing-schemas -summary "$out"/*.yaml

  integration:
    # Postgres-gated tests (skipped in `checks` where APEX_TEST_DATABASE_URI is
    # unset), including the restart-survival flagship (~15s).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apex
          POSTGRES_PASSWORD: apex
          POSTGRES_DB: apex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apex"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: Start MinIO
        run: |
          docker run -d --name apex-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=apex \
            -e MINIO_ROOT_PASSWORD=apex-minio \
            minio/minio:RELEASE.2024-07-16T23-46-41Z server /data
          for i in {1..30}; do
            if curl -fsS http://localhost:9000/minio/health/live >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs apex-minio
          exit 1
      - name: Apply integration database migrations
        env:
          APEX_DATABASE__URI: postgresql+asyncpg://apex:apex@localhost:5432/apex
        run: uv run alembic upgrade head
      - name: Postgres and MinIO backed tests
        env:
          APEX_TEST_DATABASE_URI: postgresql+asyncpg://apex:apex@localhost:5432/apex
          APEX_TEST_MINIO: "1"
          APEX_MINIO_SECRET_KEY: apex-minio
        run: uv run pytest tests/unit tests/integration -v

  migrations:
    # ORM <-> migration drift gate: against a fresh DB, upgrade to head then
    # `alembic check` (compare_type + compare_server_default) must find no pending
    # changes — catches a model edit that forgot its migration.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: apex
          POSTGRES_PASSWORD: apex
          POSTGRES_DB: apex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U apex"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: Migration drift gate (ORM vs migrations)
        env:
          APEX_DATABASE__URI: postgresql+asyncpg://apex:apex@localhost:5432/apex
        run: |
          uv run alembic upgrade head
          uv run alembic check

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validate Compose files parse
        run: |
          docker compose -f docker-compose.yaml config --quiet
          docker compose -f docker-compose.dev.yaml config --quiet
          LANGGRAPH_CLOUD_LICENSE_KEY=ci APEX_AUTH__DEV_API_KEY=ci \
            docker compose -f deploy/compose-ha/docker-compose.ha.yaml config --quiet
      - name: Build dashboard image (smoke)
        run: docker build -f apps/dashboard/Dockerfile -t apex-dashboard:ci .

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: hashicorp/setup-terraform@v3 # TODO: pin to a SHA per repo policy
        with:
          terraform_wrapper: false
      - name: fmt + validate (no backend)
        run: |
          terraform -chdir=deploy/terraform fmt -check -recursive
          terraform -chdir=deploy/terraform init -backend=false -input=false
          terraform -chdir=deploy/terraform validate
          terraform -chdir=deploy/terraform/bootstrap init -backend=false -input=false
          terraform -chdir=deploy/terraform/bootstrap validate
