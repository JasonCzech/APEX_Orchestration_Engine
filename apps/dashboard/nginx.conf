# APEX dashboard static server. Designed for non-root + readOnlyRootFilesystem:
# everything writable lives under /tmp (pid, temp paths, the runtime config.json,
# and the generated reverse-proxy snippet).
worker_processes auto;
pid /tmp/nginx.pid;
events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    # Writable temp paths (image rootfs may be read-only).
    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path /tmp/nginx-proxy;
    fastcgi_temp_path /tmp/nginx-fastcgi;
    uwsgi_temp_path /tmp/nginx-uwsgi;
    scgi_temp_path /tmp/nginx-scgi;
    sendfile on;
    gzip on;
    gzip_types application/javascript application/json text/css image/svg+xml;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;

        # Mirror public/_headers for the container runtime. nginx does not
        # interpret hosting-platform _headers files itself.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Runtime-injected backend origins (apexOrigin/langgraphOrigin). Written to
        # /tmp by the entrypoint so it works on a read-only root filesystem.
        location = /config.json {
            alias /tmp/config.json;
            add_header Cache-Control "no-store";
            # A location with add_header does not inherit server-level headers.
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
            default_type application/json;
        }

        # Optional same-origin reverse proxy to the backend (/v1, /threads, /runs,
        # /assistants, /ok) with SSE-safe settings. Generated at startup; empty when
        # BACKEND_UPSTREAM is unset (SPA points at explicit origins via /config.json).
        include /tmp/apex-proxy.conf;

        # SPA fallback: client-side routes resolve to index.html.
        location / {
            try_files $uri /index.html;
        }
    }
}
